# Multi-region CodeCommit mirroring with external secret (e.g., managed by
# External Secrets Operator or Sealed Secrets).

replicaCount: 1

config:
  server:
    port: 8080

  providers:
    codecommit-eu:
      type: codecommit
      region: "${CODECOMMIT_EU_REGION}"
      credentials:
        git_username: "${CODECOMMIT_EU_GIT_USERNAME}"
        git_password: "${CODECOMMIT_EU_GIT_PASSWORD}"

    codecommit-us:
      type: codecommit
      region: "${CODECOMMIT_US_REGION}"
      credentials:
        git_username: "${CODECOMMIT_US_GIT_USERNAME}"
        git_password: "${CODECOMMIT_US_GIT_PASSWORD}"

    gitlab-main:
      type: gitlab
      base_url: "${GITLAB_MAIN_BASE_URL}"
      credentials:
        token: "${GITLAB_MAIN_TOKEN}"

  repos:
    - name: eu-app
      source: codecommit-eu
      target: gitlab-main
      source_path: eu-app
      target_path: server/eu-app
      direction: source-to-target
    - name: us-app
      source: codecommit-us
      target: gitlab-main
      source_path: us-app
      target_path: server/us-app
      direction: source-to-target

  consumers:
    - name: sqs-eu
      type: sqs
      queue_url: "${SQS_EU_QUEUE_URL}"
      region: "${SQS_EU_REGION}"
      credentials:
        access_key: "${SQS_EU_ACCESS_KEY}"
        secret_key: "${SQS_EU_SECRET_KEY}"
    - name: sqs-us
      type: sqs
      queue_url: "${SQS_US_QUEUE_URL}"
      region: "${SQS_US_REGION}"
      credentials:
        access_key: "${SQS_US_ACCESS_KEY}"
        secret_key: "${SQS_US_SECRET_KEY}"

  webhook:
    gitlab_secret: ""
    github_secret: ""

  notification:
    slack:
      webhook_url: "${SLACK_WEBHOOK_URL}"

secret:
  create: false
  existingSecret: git-bridge-external-secret

resources:
  limits:
    cpu: 1
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 256Mi

persistence:
  enabled: true
  size: 50Gi
  storageClass: gp3
